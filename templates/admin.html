{% extends 'base.html' %}
{% block content %}
<div class="form-card">
  <h2>Admin Login</h2>
  <form method="post">
    <label>Username<span>*</span></label>
    <input type="text" name="username" required>

    <label>Password<span>*</span></label>
    <input type="password" name="password" required>

    <button type="submit">Login</button>
  </form>
</div>
{% endblock %}
