{% extends 'base.html' %}
{% block content %}
<div class="form-card">
  <h2>Account Settings</h2>
  <form method="post">
    <label>Current MPIN<span>*</span></label>
    <input type="password" name="current_mpin" maxlength="4" required>

    <label>New MPIN<span>*</span></label>
    <input type="password" name="new_mpin" maxlength="4" required>

    <label>Confirm New MPIN<span>*</span></label>
    <input type="password" name="confirm_mpin" maxlength="4" required>

    <button type="submit">Update MPIN</button>
  </form>
  <a class="button button-secondary" href="{{ url_for('dashboard') }}" style="margin-top: 20px; display: inline-block;">Back to Dashboard</a>
</div>
{% endblock %}
