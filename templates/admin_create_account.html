{% extends 'base.html' %}
{% block content %}
<div class="form-card">
  <h2>Admin Create Customer Account</h2>
  <form method="post" enctype="multipart/form-data">
    <label>Customer Full Name<span>*</span></label>
    <input type="text" name="full_name" required>

    <label>Email Address<span>*</span></label>
    <input type="email" name="email" required>

    <label>Date of Birth<span>*</span></label>
    <input type="date" name="dob" required>

    <label>ID type<span>*</span></label>
    <select name="id_type">
      <option value="National ID">National ID</option>
      <option value="Passport">Passport</option>
    </select>

    <label>ID / Passport Number<span>*</span></label>
    <input type="text" name="id_number" required>

    <label>Phone Number<span>*</span></label>
    <input type="text" name="phone" required>

    <label>Biometric Phrase<span>*</span></label>
    <input type="text" name="biometric" required>

    <label>MPIN (4 digits)<span>*</span></label>
    <input type="password" name="mpin" maxlength="4" required>

    <label>Currency</label>
    <select name="currency">
      {% for code, symbol in currencies.items() %}
      <option value="{{ code }}">{{ code }} ({{ symbol }})</option>
      {% endfor %}
    </select>

    <hr>
    <h3>Optional: Upload Documents</h3>
    
    <label>Customer Photo (Optional)</label>
    <input type="file" name="photo" accept="image/*">

    <label>ID Front (Optional)</label>
    <input type="file" name="id_front" accept="image/*">

    <label>ID Back (Optional)</label>
    <input type="file" name="id_back" accept="image/*">

    <button type="submit">Create Customer Account</button>
  </form>
  <a class="button button-secondary" href="{{ url_for('admin_dashboard') }}" style="margin-top: 20px; display: inline-block;">Back to Admin Dashboard</a>
</div>
{% endblock %}
